name: 🚀 Deploy Django to PythonAnywhere (API)

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v3
      
    - name: 🚀 Deploy via PythonAnywhere API
      run: |
        # Pull latest code
        curl -X POST \
          -H "Authorization: Token ${{ secrets.PA_API_TOKEN }}" \
          -d "command=cd /home/${{ secrets.PA_USERNAME }}/Prince-Backend && git pull origin main" \
          https://www.pythonanywhere.com/api/v0/user/${{ secrets.PA_USERNAME }}/consoles/
        
        # Run migrations
        curl -X POST \
          -H "Authorization: Token ${{ secrets.PA_API_TOKEN }}" \
          -d "command=cd /home/${{ secrets.PA_USERNAME }}/Prince-Backend && source /home/${{ secrets.PA_USERNAME }}/.virtualenvs/env/bin/activate && python manage.py migrate --noinput" \
          https://www.pythonanywhere.com/api/v0/user/${{ secrets.PA_USERNAME }}/consoles/
        
        # Collect static files
        curl -X POST \
          -H "Authorization: Token ${{ secrets.PA_API_TOKEN }}" \
          -d "command=cd /home/${{ secrets.PA_USERNAME }}/Prince-Backend && source /home/${{ secrets.PA_USERNAME }}/.virtualenvs/env/bin/activate && python manage.py collectstatic --noinput --clear" \
          https://www.pythonanywhere.com/api/v0/user/${{ secrets.PA_USERNAME }}/consoles/
        
        # Reload web app
        curl -X POST \
          -H "Authorization: Token ${{ secrets.PA_API_TOKEN }}" \
          https://www.pythonanywhere.com/api/v0/user/${{ secrets.PA_USERNAME }}/webapps/${{ secrets.PA_USERNAME }}.pythonanywhere.com/reload/
