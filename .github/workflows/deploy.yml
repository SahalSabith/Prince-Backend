name: 🚀 Deploy Django to PythonAnywhere

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v3
      
    - name: 🔐 Set up SSH Agent
      uses: webfactory/ssh-agent@v0.7.0
      with:
        ssh-private-key: ${{ secrets.PA_SSH_KEY }}
        
    - name: 🔍 Test SSH Connection
      run: |
        echo "Testing SSH connection..."
        ssh -o StrictHostKeyChecking=no -o ConnectTimeout=10 ${{ secrets.PA_USERNAME }}@ssh.pythonanywhere.com "echo 'SSH connection successful'" || echo "SSH connection failed"
        
    - name: 🚀 Deploy via SSH
      run: |
        ssh -o StrictHostKeyChecking=no -o ConnectTimeout=30 ${{ secrets.PA_USERNAME }}@ssh.pythonanywhere.com << 'EOF'
        set -e
        echo "✅ Connected to PythonAnywhere"
        
        # Check current directory and user
        echo "Current user: $(whoami)"
        echo "Current directory: $(pwd)"
        echo "Home directory contents:"
        ls -la ~/
        
        echo "📁 Navigating to project directory..."
        if [ -d "/home/${{ secrets.PA_USERNAME }}/Prince-Backend/" ]; then
          cd /home/${{ secrets.PA_USERNAME }}/Prince-Backend/
          echo "✅ Project directory found"
        else
          echo "❌ Project directory not found"
          exit 1
        fi
        
        echo "📦 Pulling latest changes..."
        git pull origin main
        
        echo "🐍 Checking virtual environment..."
        if [ -d "/home/${{ secrets.PA_USERNAME }}/Prince-Backend/env/" ]; then
          source /home/${{ secrets.PA_USERNAME }}/Prince-Backend/env/bin/activate
          echo "✅ Virtual environment activated"
        else
          echo "❌ Virtual environment not found at expected location"
          echo "Available virtual environments:"
          ls -la /home/${{ secrets.PA_USERNAME }}/.virtualenvs/ || echo "No .virtualenvs directory found"
          exit 1
        fi
        
        echo "📋 Installing/updating dependencies..."
        pip install -r requirements.txt
        
        echo "🗄️ Running migrations..."
        python manage.py migrate --noinput
        
        echo "📦 Collecting static files..."
        python manage.py collectstatic --noinput --clear
        
        echo "🔄 Reloading web app..."
        touch /var/www/${{ secrets.PA_USERNAME }}_pythonanywhere_com_wsgi.py
        
        echo "✅ Deployment completed successfully!"
        EOF
