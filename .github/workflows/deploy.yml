name: 🚀 Deploy Django to PythonAnywhere

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v3

    - name: 🔐 Set up SSH Agent
      uses: webfactory/ssh-agent@v0.7.0
      with:
        ssh-private-key: ${{ secrets.PA_SSH_KEY }}

    - name: 🚀 Deploy via SSH
      run: |
        ssh -o StrictHostKeyChecking=no ${{ secrets.PA_USERNAME }}@ssh.pythonanywhere.com << 'EOF'
        echo "✅ Connected to PythonAnywhere"
        cd /home/${{ secrets.PA_USERNAME }}/Prince-Backend/
        git pull origin main
        workon env
        python manage.py migrate --noinput
        python manage.py collectstatic --noinput
        touch /var/www/${{ secrets.PA_USERNAME }}_pythonanywhere_com_wsgi.py
        EOF
