name: Django CI/CD to PythonAnywhere

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v3

    - name: 🐍 Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: 📦 Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: ✅ Run Django tests
      working-directory: ./prince  # 👈 Point to the folder with manage.py
      run: |
        python manage.py test

    - name: 🚀 Reload PythonAnywhere web app
      run: |
        curl -X POST https://www.pythonanywhere.com/api/v0/user/${{ secrets.PA_USERNAME }}/webapps/${{ secrets.PA_USERNAME }}.pythonanywhere.com/reload/ \
        -H "Authorization: Token ${{ secrets.PA_API_TOKEN }}"
